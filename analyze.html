<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyze a Brand — BizLens</title>
  <meta name="description" content="Real business data for any brand or company. Powered by Google & Wikipedia.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a08; --surface: #111110; --border: #222220;
      --accent: #e8ff47; --accent2: #ff6b35; --accent3: #47b8ff;
      --text: #e8e6e0; --muted: #6b6960; --success: #4dff91;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ""; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 1000; opacity: 0.4;
    }
    header {
      border-bottom: 1px solid var(--border); padding: 0 40px; height: 60px;
      display: flex; align-items: center; gap: 16px; position: sticky; top: 0;
      background: rgba(10,10,8,0.95); backdrop-filter: blur(20px); z-index: 100;
    }
    .logo { font-family: "Bebas Neue", sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--accent); text-decoration: none; }
    .header-tag { font-family: "DM Mono", monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; border: 1px solid var(--border); padding: 3px 8px; }
    .back-link { font-family: "DM Mono", monospace; font-size: 11px; color: var(--muted); text-decoration: none; letter-spacing: 1px; margin-left: auto; transition: color 0.2s; }
    .back-link:hover { color: var(--accent); }
    .main { max-width: 1100px; margin: 0 auto; padding: 40px; }
    .input-label { font-family: "DM Mono", monospace; font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px; display: block; }
    .input-row { display: flex; gap: 0; margin-bottom: 60px; }
    .product-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-right: none;
      color: var(--text); font-family: "DM Sans", sans-serif; font-size: 16px; padding: 16px 20px; outline: none; transition: border-color 0.2s;
    }
    .product-input:focus { border-color: var(--accent); }
    .product-input::placeholder { color: var(--muted); }
    .analyze-btn {
      background: var(--accent); color: #0a0a08; border: none;
      font-family: "Bebas Neue", sans-serif; font-size: 18px; letter-spacing: 2px;
      padding: 0 36px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .analyze-btn:hover { background: #fff; }
    .analyze-btn:disabled { background: var(--muted); cursor: not-allowed; }

    /* LOADING */
    .loading { display: none; text-align: center; padding: 80px 0; }
    .loading.active { display: block; }
    .loading-bar-wrap { width: 300px; margin: 20px auto; height: 2px; background: var(--border); overflow: hidden; }
    .loading-bar { height: 100%; background: var(--accent); animation: loadbar 1.4s ease-in-out infinite; }
    @keyframes loadbar { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
    .loading-text { font-family: "DM Mono", monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .loading-steps { margin-top: 16px; }
    .loading-step { font-family: "DM Mono", monospace; font-size: 11px; color: var(--border); letter-spacing: 1px; padding: 4px 0; transition: color 0.3s; }
    .loading-step.active { color: var(--accent); }
    .loading-step.done { color: var(--success); }

    /* RESULTS */
    .results { display: none; }
    .results.active { display: block; animation: fadeUp 0.4s ease both; }

    /* NOT FOUND */
    .not-found {
      border: 1px solid var(--border); padding: 48px; text-align: center;
    }
    .not-found h2 { font-family: "Bebas Neue", sans-serif; font-size: 48px; color: var(--accent2); margin-bottom: 16px; }
    .not-found p { font-family: "DM Mono", monospace; font-size: 13px; color: var(--muted); line-height: 1.8; }

    /* BRAND HERO */
    .brand-hero { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
    .brand-name { font-family: "Bebas Neue", sans-serif; font-size: clamp(48px, 8vw, 96px); line-height: 0.9; color: var(--accent); letter-spacing: 2px; margin-bottom: 12px; }
    .brand-desc { font-size: 14px; color: #c8c6c0; line-height: 1.8; max-width: 800px; margin-bottom: 20px; }
    .source-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { font-family: "DM Mono", monospace; font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; text-transform: uppercase; }
    .badge-green { background: rgba(77,255,145,0.1); color: var(--success); border: 1px solid rgba(77,255,145,0.2); }
    .badge-blue { background: rgba(71,184,255,0.1); color: var(--accent3); border: 1px solid rgba(71,184,255,0.2); }
    .badge-yellow { background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.2); }

    /* DATA GRID */
    .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-bottom: 2px; }
    .data-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; }
    .data-card-label { font-family: "DM Mono", monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
    .data-card-value { font-family: "Bebas Neue", sans-serif; font-size: 28px; color: var(--text); letter-spacing: 1px; line-height: 1.1; }
    .data-card-value.accent { color: var(--accent); }
    .data-card-value.blue { color: var(--accent3); }
    .data-card-value.green { color: var(--success); }
    .data-card-value.orange { color: var(--accent2); }
    .data-card-value.small { font-size: 18px; }
    .na { color: var(--muted); font-family: "DM Mono", monospace; font-size: 13px; }

    /* FULL WIDTH CARD */
    .full-card { background: var(--surface); border: 1px solid var(--border); padding: 28px; margin-bottom: 2px; }
    .full-card h3 { font-family: "DM Mono", monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
    .full-card p { font-size: 14px; color: #c8c6c0; line-height: 1.8; }
    .full-card a { color: var(--accent3); text-decoration: none; font-family: "DM Mono", monospace; font-size: 13px; }
    .full-card a:hover { text-decoration: underline; }

    /* LINKS ROW */
    .links-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .ext-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: "DM Mono", monospace; font-size: 11px; letter-spacing: 1px;
      padding: 8px 16px; border: 1px solid var(--border); color: var(--muted);
      text-decoration: none; transition: all 0.2s; text-transform: uppercase;
    }
    .ext-link:hover { border-color: var(--accent); color: var(--accent); }

    /* DATA SOURCE NOTE */
    .source-note { font-family: "DM Mono", monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); }

    /* ERROR */
    .error-box { background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2); padding: 24px; color: var(--accent2); font-family: "DM Mono", monospace; font-size: 13px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) { .data-grid { grid-template-columns: 1fr 1fr; } .main { padding: 20px; } header { padding: 0 20px; } }
    @media (max-width: 600px) { .data-grid { grid-template-columns: 1fr; } .input-row { flex-direction: column; } .analyze-btn { padding: 16px; } }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">BizLens</a>
  <div class="header-tag">Real Data Only</div>
  <a href="/" class="back-link">← Home</a>
</header>

<div class="main">
  <span class="input-label">// Search Any Brand, Company or Product</span>
  <div class="input-row">
    <input class="product-input" id="productInput" type="text"
      placeholder="e.g. Tata Motors, Zomato, Nike, Amul, Jio...">
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">SEARCH</button>
  </div>

  <div class="loading" id="loading">
    <div class="loading-text">Fetching Real Data</div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
    <div class="loading-steps">
      <div class="loading-step" id="step1">→ Searching Google Knowledge Graph...</div>
      <div class="loading-step" id="step2">→ Pulling Wikipedia data...</div>
      <div class="loading-step" id="step3">→ Fetching Wikidata (revenue, employees)...</div>
      <div class="loading-step" id="step4">→ Building real profile...</div>
    </div>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
  const preloaded = sessionStorage.getItem("bizlens_product");
  if (preloaded) {
    document.getElementById("productInput").value = preloaded;
    sessionStorage.removeItem("bizlens_product");
    setTimeout(analyze, 300);
  }

  function animateSteps() {
    const steps = ["step1","step2","step3","step4"];
    let i = 0;
    const iv = setInterval(() => {
      if (i > 0) document.getElementById(steps[i-1]).className = "loading-step done";
      if (i < steps.length) { document.getElementById(steps[i]).className = "loading-step active"; i++; }
      else clearInterval(iv);
    }, 700);
    return iv;
  }

  async function analyze() {
    const input = document.getElementById("productInput").value.trim();
    if (!input) return;

    const btn = document.getElementById("analyzeBtn");
    const loading = document.getElementById("loading");
    const results = document.getElementById("results");

    ["step1","step2","step3","step4"].forEach(id => document.getElementById(id).className = "loading-step");
    btn.disabled = true;
    loading.classList.add("active");
    results.classList.remove("active");
    results.innerHTML = "";

    const stepIv = animateSteps();

    try {
      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ product: input })
      });

      clearInterval(stepIv);
      const d = await res.json();

      if (!d.found) {
        results.innerHTML = `
          <div class="not-found">
            <h2>No Data Found</h2>
            <p>${d.message}</p>
            <p style="margin-top:16px">Try searching with the full official name.<br>
            Small local brands may not have a Wikipedia or Google listing yet.</p>
          </div>`;
      } else {
        renderResults(d);
      }

      results.classList.add("active");

    } catch(err) {
      clearInterval(stepIv);
      results.innerHTML = `<div class="error-box">⚠ ${err.message || "Something went wrong. Please try again."}</div>`;
      results.classList.add("active");
    }

    btn.disabled = false;
    loading.classList.remove("active");
  }

  function val(v, cls="") {
    if (!v) return `<span class="na">—</span>`;
    return `<div class="data-card-value ${cls}">${v}</div>`;
  }

  function renderResults(d) {
    const results = document.getElementById("results");

    const sourceBadges = [
      d.sources?.googleKG ? `<span class="badge badge-yellow">✓ Google Knowledge Graph</span>` : "",
      d.sources?.wikipedia ? `<span class="badge badge-blue">✓ Wikipedia</span>` : "",
      d.sources?.wikidata ? `<span class="badge badge-green">✓ Wikidata</span>` : ""
    ].filter(Boolean).join("");

    const links = [
      d.website ? `<a href="${d.website}" target="_blank" class="ext-link">🌐 Official Website</a>` : "",
      d.wikiUrl ? `<a href="${d.wikiUrl}" target="_blank" class="ext-link">📖 Wikipedia</a>` : "",
      d.wikidataUrl ? `<a href="${d.wikidataUrl}" target="_blank" class="ext-link">🔗 Wikidata</a>` : ""
    ].filter(Boolean).join("");

    results.innerHTML = `
      <div class="brand-hero">
        <div class="brand-name">${d.name}</div>
        <div class="brand-desc">${d.description}</div>
        <div class="source-badges">${sourceBadges}</div>
      </div>

      <div class="data-grid">
        <div class="data-card">
          <div class="data-card-label">Industry</div>
          ${val(d.industry, "small")}
        </div>
        <div class="data-card">
          <div class="data-card-label">Country</div>
          ${val(d.country, "small")}
        </div>
        <div class="data-card">
          <div class="data-card-label">Founded</div>
          ${val(d.founded, "accent")}
        </div>
        <div class="data-card">
          <div class="data-card-label">Annual Revenue</div>
          ${val(d.revenue, "green")}
        </div>
        <div class="data-card">
          <div class="data-card-label">Employees</div>
          ${val(d.employees, "blue")}
        </div>
        <div class="data-card">
          <div class="data-card-label">Stock Symbol</div>
          ${val(d.stockSymbol, "orange")}
        </div>
        <div class="data-card">
          <div class="data-card-label">Headquarters</div>
          ${val(d.headquarters, "small")}
        </div>
        <div class="data-card">
          <div class="data-card-label">CEO / Leader</div>
          ${val(d.ceo, "small")}
        </div>
        <div class="data-card">
          <div class="data-card-label">Founder</div>
          ${val(d.founder, "small")}
        </div>
      </div>

      ${links ? `
      <div class="full-card">
        <h3>Official Links</h3>
        <div class="links-row">${links}</div>
      </div>` : ""}

      <div class="source-note">
        ⚡ All data sourced in real-time from Google Knowledge Graph, Wikipedia & Wikidata.
        No AI-generated or fake data. If a field shows — it means no public data exists for it.
      </div>
    `;
  }

  document.getElementById("productInput").addEventListener("keydown", e => {
    if (e.key === "Enter") analyze();
  });
</script>
</body>
</html>
